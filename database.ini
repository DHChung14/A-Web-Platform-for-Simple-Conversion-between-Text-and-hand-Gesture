Xem,Nhìn để theo dõi hoặc thưởng thức điều gì đó,
Mua,Dùng tiền để sở hữu một món hàng,
Bán,Giao hàng hóa cho người khác để nhận tiền,
Yêu,Tình cảm gắn bó tha thiết với một người,
Thích,Cảm thấy hay hoặc vừa ý với một điều gì đó,
Biết,Có thông tin hoặc hiểu biết về một sự việc,
Hiểu,Nắm rõ được ý nghĩa hoặc bản chất vấn đề,
Đợi,Chờ đợi một ai đó hoặc một sự việc xảy ra,
Nghỉ,Tạm dừng hoạt động để phục hồi sức lực,
Cơm,Thức ăn nấu từ gạo là món chính của người Việt,
Nước,Chất lỏng không màu không mùi cần cho sự sống,
Nhà,Công trình xây dựng để con người ở,
Trường,Nơi diễn ra các hoạt động dạy và học,
Chợ,Nơi tập trung mua bán hàng hóa hằng ngày,
Sách,Tập hợp các trang giấy chứa đựng kiến thức,
Bút,Dụng cụ dùng để viết hoặc vẽ,
Xe,Phương tiện có bánh dùng để di chuyển,
Đường,Lối đi lại hoặc một loại gia vị ngọt,
Hoa,Bộ phận đẹp nhất và có màu sắc của cây,
Trời,Khoảng không gian bao la phía trên mặt đất,
Đất,Phần bề mặt rắn của trái đất nơi cây cối mọc,
Cửa,Lối để ra vào một ngôi nhà hoặc căn phòng,
Bàn,Đồ dùng có mặt phẳng để làm việc hoặc để đồ,
Ghế,Đồ dùng có mặt nằm ngang để ngồi,
Áo,Đồ mặc để che và giữ ấm phần thân trên,
Quần,Đồ mặc để che phần dưới của cơ thể,
Tiền,Vật ngang giá dùng để trao đổi hàng hóa,
Tay,Bộ phận cơ thể dùng để cầm và nắm,
Chân,Bộ phận cơ thể dùng để đứng và đi lại,
Tốt,Đạt yêu cầu cao về chất lượng hoặc đạo đức,
Xấu,Không đạt yêu cầu hoặc có hình thức không đẹp,
Đẹp,Gây cảm giác thích thú khi nhìn vào,
To,Có kích thước hoặc quy mô lớn,
Nhỏ,Có kích thước hoặc quy mô không đáng kể,
Nóng,Có nhiệt độ cao gây cảm giác oi bức,
Lạnh,Có nhiệt độ thấp gây cảm giác buốt,
Vui,Cảm giác phấn khởi và dễ chịu trong lòng,
Buồn,Cảm giác đau lòng hoặc không được như ý,
Ngon,Cảm giác thích thú khi ăn hoặc uống,
Đắt,Có giá tiền cao hơn mức bình thường,
Rẻ,Có giá tiền thấp hơn mức bình thường,
Nhanh,Tốc độ chuyển động hoặc thực hiện cao,
Chậm,Tốc độ chuyển động hoặc thực hiện thấp,
Mới,Vừa mới xuất hiện hoặc chưa qua sử dụng,