Mười,Số đếm đứng sau số chín,
Ăn,Hành động đưa thức ăn vào miệng và nuốt,
Uống,Hành động đưa chất lỏng vào miệng và nuốt,
Ngủ,Trạng thái nghỉ ngơi tự nhiên của cơ thể,
Đi,Di chuyển từ nơi này đến nơi khác bằng chân,
Đến,Tới một địa điểm cụ thể nào đó,
Làm,Thực hiện một hành động hoặc công việc cụ thể,
Học,Tiếp thu kiến thức hoặc kỹ năng mới,
Nói,Phát ra âm thanh bằng miệng để giao tiếp,
Nghe,Tiếp nhận âm thanh bằng tai,
Đọc,Nhìn vào văn bản và hiểu nội dung bên trong,
