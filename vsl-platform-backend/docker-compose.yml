# ==================== VSL Platform Docker Compose Configuration ====================
# Version: Final Production Configuration
# Architecture: 5 microservices (postgres, elasticsearch, ai-service, backend, frontend)
# Network: vsl-network (bridge mode)
# ====================================================================================

services:
  # ==================== Service 1: PostgreSQL Database ====================
  postgres:
    image: postgres:16-alpine
    container_name: vsl-postgres
    environment:
      POSTGRES_DB: vsl_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Host:Container (5433 to avoid conflicts with system Postgres)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vsl-network
    restart: unless-stopped

  # ==================== Service 2: Elasticsearch ====================
  elasticsearch:
    image: elasticsearch:8.11.1
    container_name: vsl-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200" # HTTP API
      - "9300:9300" # Transport
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vsl-network
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # ==================== Service 3: Python AI Service (Flask) ====================
  ai-service:
    build:
      context: ../vsl-platform-ai-model
      dockerfile: Dockerfile
    container_name: vsl-ai-service
    ports:
      - "5000:5000"
    environment:
      TZ: Asia/Ho_Chi_Minh
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
    networks:
      - vsl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== Service 4: Spring Boot Backend (API Gateway) ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vsl-backend
    ports:
      - "8081:8080" # Host:Container (8081 for external access, 8080 internal)
    environment:
      # Database Configuration (Container-to-Container)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vsl_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      # JPA Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      # Elasticsearch Configuration (Container-to-Container)
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_ELASTICSEARCH_CONNECTION_TIMEOUT: 5s
      SPRING_ELASTICSEARCH_SOCKET_TIMEOUT: 60s

      # AI Service Configuration (Container-to-Container)
      AI_SERVICE_URL: http://ai-service:5000
      AI_SERVICE_TIMEOUT: 10000

      # JWT Configuration
      JWT_SECRET: vsl-platform-secret-key-change-this-in-production-minimum-256-bits-for-hmac-sha256
      JWT_EXPIRATION: 86400000

      # Server Configuration
      SERVER_PORT: 8080

      # Timezone
      TZ: Asia/Ho_Chi_Minh

      # Java Options
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - vsl-network
    restart: unless-stopped
    # Temporarily disabled to diagnose unhealthy issue
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f 'http://localhost:8080/api/dictionary/search?keyword=' || exit 1"]
    #   interval: 20s
    #   timeout: 15s
    #   retries: 5
    #   start_period: 80s

  # ==================== Service 5: Next.js Frontend ====================
  frontend:
    build:
      context: ../vsl-platform-frontend
      dockerfile: Dockerfile
      args:
        # Build-time argument: NEXT_PUBLIC_* vars must be set at build time
        NEXT_PUBLIC_API_URL: http://localhost:8081/api
    container_name: vsl-frontend
    ports:
      - "3000:3000" # Host:Container
    environment:
      # Runtime environment variables
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vsl-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Service 6: Prometheus (Metrics Collection) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: vsl-prometheus
    ports:
      - "9090:9090" # Host:Container (Prometheus UI)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - vsl-network
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==================== Service 7: Grafana (Metrics Visualization) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: vsl-grafana
    ports:
      - "3001:3000" # Host:Container (Grafana UI on port 3001 to avoid conflict with frontend)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - vsl-network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ==================== Networks ====================
networks:
  vsl-network:
    driver: bridge
    name: vsl-network

# ==================== Volumes ====================
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
# ==================== Notes ====================
# - Volumes (postgres-data, elasticsearch-data) are local directories (bind mounts)
# - Health checks ensure proper startup sequence: DB/ES/AI → Backend → Frontend → Prometheus → Grafana
# - Frontend uses host.docker.internal:8081 for browser-based API calls
# - Backend uses service names (postgres:5432, elasticsearch:9200, ai-service:5000) for internal calls
# - Prometheus scrapes backend metrics from backend:8080/actuator/prometheus (container-to-container)
# - Grafana connects to Prometheus at prometheus:9090 (container-to-container)
# - Monitoring stack: Backend (metrics source) → Prometheus (collector) → Grafana (visualization)

