# ==================== VSL Platform Docker Compose - AWS Free Tier Optimized ====================
# Version: Free Tier Configuration
# Architecture: 3 microservices (frontend, backend, ai-service)
# Database: RDS PostgreSQL (external, không chạy trên EC2)
# Search: PostgreSQL full-text search (bỏ Elasticsearch để tiết kiệm RAM)
# Memory: Tối ưu cho EC2 t2.micro (1GB RAM total)
# =============================================================================================

version: "3.8"

services:
  # ==================== Service 1: Next.js Frontend ====================
  frontend:
    build:
      context: ../vsl-platform-frontend
      dockerfile: Dockerfile
    container_name: vsl-frontend
    ports:
      - "3000:3000"
    environment:
      # Runtime environment variables
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # API URL - Production domain
      NEXT_PUBLIC_API_URL: https://api.canhnq.online/api
    mem_limit: 256m # Giới hạn 256MB RAM
    mem_reservation: 128m # Reserve 128MB
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Service 2: Spring Boot Backend ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vsl-backend
    ports:
      - "8080:8080"
    environment:
      # Database Configuration - Thay <RDS_ENDPOINT> và <RDS_PASSWORD> bằng giá trị thực tế
      SPRING_DATASOURCE_URL: jdbc:postgresql://<RDS_ENDPOINT>:5432/vsl_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: <RDS_PASSWORD>
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      # JPA Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      # Elasticsearch Configuration - BỎ QUA (dùng PostgreSQL full-text search)
      # SPRING_ELASTICSEARCH_URIS: (không set, backend sẽ skip Elasticsearch)

      # AI Service Configuration (Container-to-Container)
      AI_SERVICE_URL: http://ai-service:5000
      AI_SERVICE_TIMEOUT: 10000

      # JWT Configuration - Thay <JWT_SECRET> bằng secret mạnh
      JWT_SECRET: <JWT_SECRET>

      # Server Configuration
      SERVER_PORT: 8080

      # CORS Configuration - Allow production domains
      CORS_ALLOWED_ORIGINS: https://canhnq.online,https://www.canhnq.online,http://canhnq.online,http://www.canhnq.online

      # Timezone
      TZ: Asia/Ho_Chi_Minh

      # Java Options - Tối ưu cho 1GB RAM total
      JAVA_OPTS: "-Xmx256m -Xms128m -XX:+UseG1GC"
    mem_limit: 384m # Giới hạn 384MB RAM
    mem_reservation: 256m # Reserve 256MB
    depends_on:
      - ai-service
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/dictionary/count",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 80s

  # ==================== Service 3: Python AI Service (Flask) ====================
  ai-service:
    build:
      context: ../vsl-platform-ai-model
      dockerfile: Dockerfile
    container_name: vsl-ai-service
    ports:
      - "5000:5000"
    environment:
      TZ: Asia/Ho_Chi_Minh
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      # Gunicorn config - Giảm workers để tiết kiệm RAM
      GUNICORN_WORKERS: 1 # Giảm từ 2 → 1
      GUNICORN_THREADS: 2 # Giữ 2 threads
    mem_limit: 256m # Giới hạn 256MB RAM
    mem_reservation: 128m # Reserve 128MB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ==================== Networks ====================
networks:
  default:
    name: vsl-network
    driver: bridge
# ==================== Notes ====================
# Memory Usage:
#   - Frontend: 256MB
#   - Backend: 384MB
#   - AI Service: 256MB
#   - Total: ~896MB < 1GB ✅
#
# Thay đổi cần thiết trước khi chạy:
#   1. Thay <RDS_ENDPOINT> bằng RDS endpoint thực tế
#   2. Thay <RDS_PASSWORD> bằng password RDS
#   3. Thay <JWT_SECRET> bằng JWT secret mạnh
#   4. Thay NEXT_PUBLIC_API_URL nếu cần (hoặc dùng Nginx reverse proxy)
#
# Bỏ qua:
#   - PostgreSQL (dùng RDS)
#   - Elasticsearch (dùng PostgreSQL full-text search)
#
# Deploy:
#   docker-compose -f docker-compose.free-tier.yml up -d

