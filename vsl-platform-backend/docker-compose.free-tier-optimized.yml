# ==================== VSL Platform Docker Compose - AWS Free Tier OPTIMIZED ====================
# Version: Free Tier Optimized Configuration
# Architecture: 3 microservices (frontend, backend, ai-service)
# Database: RDS PostgreSQL (external, không chạy trên EC2)
# Search: PostgreSQL full-text search (bỏ Elasticsearch để tiết kiệm RAM)
# Memory: Tối ưu cho EC2 t2.micro (1GB RAM total) - VERSION OPTIMIZED
# =============================================================================================

version: "3.8"

services:
  # ==================== Service 1: Next.js Frontend ====================
  frontend:
    build:
      context: ../vsl-platform-frontend
      dockerfile: Dockerfile
    container_name: vsl-frontend
    ports:
      - "3000:3000"
    environment:
      # Runtime environment variables
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # API URL - Thay <EC2_PUBLIC_IP> bằng IP thực tế
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    mem_limit: 220m # Giảm từ 256m → 220m (tiết kiệm cho AI service)
    mem_reservation: 120m # Giảm từ 128m → 120m
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Service 2: Spring Boot Backend ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vsl-backend
    ports:
      - "8080:8080"
    environment:
      # Database Configuration - Thay <RDS_ENDPOINT> và <RDS_PASSWORD> bằng giá trị thực tế
      SPRING_DATASOURCE_URL: jdbc:postgresql://<RDS_ENDPOINT>:5432/vsl_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: <RDS_PASSWORD>
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      # JPA Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      # Elasticsearch Configuration - BỎ QUA (dùng PostgreSQL full-text search)
      # SPRING_ELASTICSEARCH_URIS: (không set, backend sẽ skip Elasticsearch)

      # AI Service Configuration (Container-to-Container)
      AI_SERVICE_URL: http://ai-service:5000
      AI_SERVICE_TIMEOUT: 10000

      # JWT Configuration - Thay <JWT_SECRET> bằng secret mạnh
      JWT_SECRET: <JWT_SECRET>

      # Server Configuration
      SERVER_PORT: 8080

      # Timezone
      TZ: Asia/Ho_Chi_Minh

      # Java Options - Tối ưu cho 1GB RAM total (tăng heap lên 280MB)
      JAVA_OPTS: "-Xmx280m -Xms140m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
    mem_limit: 400m # Tăng từ 384m → 400m (để hỗ trợ heap 280MB)
    mem_reservation: 280m # Tăng từ 256m → 280m
    depends_on:
      - ai-service
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/dictionary/count",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 80s

  # ==================== Service 3: Python AI Service (Flask) ====================
  ai-service:
    build:
      context: ../vsl-platform-ai-model
      dockerfile: Dockerfile
    container_name: vsl-ai-service
    ports:
      - "5000:5000"
    environment:
      TZ: Asia/Ho_Chi_Minh
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      # Gunicorn config - Giảm workers và threads để tiết kiệm RAM
      GUNICORN_WORKERS: 1 # Giữ 1 worker
      GUNICORN_THREADS: 1 # Giảm từ 2 → 1 (tiết kiệm RAM)
      # Python memory optimization
      PYTHONHASHSEED: 0
      MALLOC_ARENA_MAX: 2 # Giảm memory fragmentation
    mem_limit: 320m # Tăng từ 256m → 320m (để load torch/transformers models)
    mem_reservation: 200m # Tăng từ 128m → 200m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ==================== Networks ====================
networks:
  default:
    name: vsl-network
    driver: bridge

# ==================== Notes ====================
# Memory Usage (OPTIMIZED):
#   - Frontend: 220MB (giảm từ 256MB)
#   - Backend: 400MB (tăng từ 384MB, heap 280MB)
#   - AI Service: 320MB (tăng từ 256MB, để load torch/transformers)
#   - Total: ~940MB < 1GB ✅
#   - System overhead: ~60MB (OS, Docker, Nginx)
#   - Total system: ~1000MB = 1GB ✅
#
# Tối ưu:
#   1. Frontend: Giảm memory (Next.js standalone vẫn chạy tốt với 220MB)
#   2. Backend: Tăng heap lên 280MB (tốt hơn cho Spring Boot)
#   3. AI Service: Tăng memory lên 320MB (để load torch/transformers models)
#   4. AI Service: Giảm threads từ 2 → 1 (tiết kiệm RAM)
#
# Thay đổi cần thiết trước khi chạy:
#   1. Thay <RDS_ENDPOINT> bằng RDS endpoint thực tế
#   2. Thay <RDS_PASSWORD> bằng password RDS
#   3. Thay <JWT_SECRET> bằng JWT secret mạnh
#   4. Thay NEXT_PUBLIC_API_URL nếu cần (hoặc dùng Nginx reverse proxy)
#
# Bỏ qua:
#   - PostgreSQL (dùng RDS)
#   - Elasticsearch (dùng PostgreSQL full-text search)
#
# Deploy:
#   docker-compose -f docker-compose.free-tier-optimized.yml up -d
#
# Monitoring:
#   docker stats --no-stream
#   free -h
#

