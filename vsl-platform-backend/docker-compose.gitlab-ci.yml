# ==================== VSL Platform Docker Compose - GitLab CI/CD Version ====================
# Version: GitLab CI/CD Configuration
# Architecture: 3 microservices (frontend, backend, ai-service)
# Images: Pull từ GitLab Container Registry (không build local)
# Database: RDS PostgreSQL (external)
# Memory: Tối ưu cho EC2 t2.micro (1GB RAM total)
# =============================================================================================

version: "3.8"

services:
  # ==================== Service 1: Next.js Frontend ====================
  frontend:
    # Thay <your-username> và <project-name> bằng GitLab project của bạn
    image: registry.gitlab.com/<your-username>/<project-name>/frontend:latest
    container_name: vsl-frontend
    ports:
      - "3000:3000"
    environment:
      # Runtime environment variables
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # API URL - Thay <EC2_PUBLIC_IP> bằng IP thực tế
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    mem_limit: 256m # Giới hạn 256MB RAM
    mem_reservation: 128m # Reserve 128MB
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Service 2: Spring Boot Backend ====================
  backend:
    # Thay <your-username> và <project-name> bằng GitLab project của bạn
    image: registry.gitlab.com/<your-username>/<project-name>/backend:latest
    container_name: vsl-backend
    ports:
      - "8080:8080"
    environment:
      # Database Configuration - Dùng environment variables từ EC2
      SPRING_DATASOURCE_URL: jdbc:postgresql://${RDS_ENDPOINT}:5432/vsl_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      # JPA Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      # Elasticsearch Configuration - BỎ QUA (dùng PostgreSQL full-text search)
      # SPRING_ELASTICSEARCH_URIS: (không set, backend sẽ skip Elasticsearch)

      # AI Service Configuration (Container-to-Container)
      AI_SERVICE_URL: http://ai-service:5000
      AI_SERVICE_TIMEOUT: 10000

      # JWT Configuration - Dùng environment variable từ EC2
      JWT_SECRET: ${JWT_SECRET}

      # Server Configuration
      SERVER_PORT: 8080

      # Timezone
      TZ: Asia/Ho_Chi_Minh

      # Java Options - Tối ưu cho 1GB RAM total
      JAVA_OPTS: "-Xmx256m -Xms128m -XX:+UseG1GC"
    mem_limit: 384m # Giới hạn 384MB RAM
    mem_reservation: 256m # Reserve 256MB
    depends_on:
      - ai-service
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/dictionary/count",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 80s

  # ==================== Service 3: Python AI Service (Flask) ====================
  ai-service:
    # Thay <your-username> và <project-name> bằng GitLab project của bạn
    image: registry.gitlab.com/<your-username>/<project-name>/ai-service:latest
    container_name: vsl-ai-service
    ports:
      - "5000:5000"
    environment:
      TZ: Asia/Ho_Chi_Minh
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      # Gunicorn config - Giảm workers để tiết kiệm RAM
      GUNICORN_WORKERS: 1 # Giảm từ 2 → 1
      GUNICORN_THREADS: 2 # Giữ 2 threads
    mem_limit: 256m # Giới hạn 256MB RAM
    mem_reservation: 128m # Reserve 128MB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ==================== Networks ====================
networks:
  default:
    name: vsl-network
    driver: bridge

# ==================== Notes ====================
# Memory Usage:
#   - Frontend: 256MB
#   - Backend: 384MB
#   - AI Service: 256MB
#   - Total: ~896MB < 1GB ✅
#
# Thay đổi cần thiết trước khi chạy:
#   1. Thay <your-username> và <project-name> trong image paths
#   2. Setup environment variables trên EC2:
#      export RDS_ENDPOINT=your-rds-endpoint.region.rds.amazonaws.com
#      export RDS_PASSWORD=your-rds-password
#      export JWT_SECRET=your-jwt-secret
#   3. Login GitLab Container Registry:
#      docker login registry.gitlab.com
#      Username: <gitlab-username>
#      Password: <gitlab-personal-access-token>
#
# Deploy:
#   docker-compose -f docker-compose.gitlab-ci.yml pull
#   docker-compose -f docker-compose.gitlab-ci.yml up -d
#

